name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous build artifacts
        run: rm -rf .output .vinxi .wrangler

      # We do a two pass build due to a nitro bug. If we only do the second build, assets are all broken.
      - name: Build (node)
        run: pnpm run build

      - name: Build (cloudflare)
        env:
          NITRO_PRESET: cloudflare-module
        run: pnpm run build

      - name: Deploy
        run: pnpx --allow-build=esbuild --allow-build=sharp --allow-build=workerd wrangler deploy .output/server/index.mjs --assets .output/public
